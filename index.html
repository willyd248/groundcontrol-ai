<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GroundControl AI — Airport Ground Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#0d1117;--bg3:#111827;--border:rgba(255,255,255,0.08);--t1:#f0f4f8;--t2:#64748b;--t3:#475569;--blue:#3B82F6;--green:#10B981;--amber:#F59E0B;--red:#EF4444;--purple:#8B5CF6;--cyan:#06B6D4;--mono:'JetBrains Mono',monospace;--sans:'Inter',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);overflow:hidden;height:100vh;width:100vw}

#map-wrap{position:absolute;top:0;left:0;right:320px;bottom:48px;background:var(--bg)}
#map-wrap canvas{display:block;width:100%;height:100%}
#right-panel{position:absolute;top:0;right:0;width:320px;bottom:48px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;z-index:5}
#kpi{position:absolute;bottom:0;left:0;right:0;height:48px;background:rgba(10,14,26,.97);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;font-family:var(--mono);z-index:5;backdrop-filter:blur(8px)}

.ps{flex:1;min-height:0;display:flex;flex-direction:column}
.ps+.ps{border-top:1px solid var(--border)}
.ph{padding:12px 16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06)}
.pt{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:8px}
.pt .ld{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pd 2s infinite}
.pst{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px}
.pb{flex:1;min-height:0;overflow-y:auto;padding:0 10px 10px}
.pb::-webkit-scrollbar{width:3px}
.pb::-webkit-scrollbar-track{background:transparent}
.pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

#inbound-section{flex-shrink:0;padding:0 12px 8px;border-bottom:1px solid var(--border)}
#inbound-section .iq-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);padding:8px 4px 6px}
.iq-row{display:flex;align-items:center;gap:8px;padding:4px;font-family:var(--mono);font-size:10px;color:var(--t2)}
.iq-row .iq-icon{color:rgba(255,255,255,0.4);font-size:11px}
.iq-row .iq-flight{color:var(--t1);font-weight:500;min-width:52px}
.iq-row .iq-gate{color:var(--t3);min-width:52px}
.iq-row .iq-eta{color:var(--amber);min-width:48px;text-align:right}
.iq-bar{flex:1;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.iq-bar-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .5s linear}

.de{font-family:var(--mono);font-size:10.5px;padding:5px 8px;border-radius:4px;color:var(--t2);line-height:1.4;animation:si .2s ease-out;margin-bottom:2px;display:flex;align-items:baseline;gap:6px}
.de:hover{background:rgba(255,255,255,0.02)}
.de.em-row{background:rgba(239,68,68,0.08);border-left:2px solid var(--red)}
.de .dt{color:var(--t3);flex-shrink:0;font-size:10px}
.de .di{flex-shrink:0;font-size:9px}
.de .dx{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.de .dg{flex-shrink:0;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.3px}
.dg.a{background:rgba(59,130,246,.12);color:#60a5fa}
.dg.c{background:rgba(16,185,129,.12);color:#34d399}
.dg.v{background:rgba(239,68,68,.12);color:#f87171}
.dg.e{background:rgba(239,68,68,.15);color:#f87171}
.dg.w{background:rgba(245,158,11,.12);color:#fbbf24}
#nxt{font-family:var(--mono);font-size:10px;color:var(--t3);padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0;text-align:center}

.fr{display:grid;grid-template-columns:3px 56px 62px 1fr 40px;align-items:center;gap:5px;padding:5px 6px 5px 0;border-radius:0 4px 4px 0;font-family:var(--mono);font-size:10.5px;cursor:pointer;transition:background .1s}
.fr:hover{background:rgba(255,255,255,.03)}
.fr.sel{background:rgba(59,130,246,.08)}
.fr .fl-border{width:3px;height:100%;border-radius:2px;align-self:stretch}
.fi{color:var(--t1);font-weight:500;white-space:nowrap}
.fb{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;text-align:center;white-space:nowrap}
.fb.i{background:rgba(255,255,255,.04);color:var(--t3)}
.fb.d{background:rgba(59,130,246,.12);color:#60a5fa}
.fb.s{background:rgba(245,158,11,.12);color:#fbbf24}
.fb.r{background:rgba(16,185,129,.08);color:#34d399}
.fb.vl{background:rgba(239,68,68,.12);color:#f87171;animation:fl .8s infinite}
.fb.em{background:rgba(239,68,68,.15);color:#f87171;animation:fl .5s infinite}
.fds{color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.ft{color:var(--t3);text-align:right;font-size:10px;font-variant-numeric:tabular-nums}
.fr .svc-bar{grid-column:2/6;height:3px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;margin-top:2px}
.fr .svc-bar-fill{height:100%;border-radius:2px;transition:width .3s}

.kb{font-family:var(--sans);font-weight:800;font-size:13px;color:#fff;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;margin-right:24px}
.kb .ld{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pd 2s infinite}
.kd{width:1px;height:24px;background:rgba(255,255,255,.12);margin:0 16px}
.ki{display:flex;align-items:center;gap:8px}
.kl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.kv{font-size:14px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;min-width:20px;transition:color .3s}
.kv.al{color:var(--red)}
.kc{margin-left:auto;font-size:13px;color:var(--t2);font-weight:500}

#vc{position:absolute;bottom:16px;left:16px;width:260px;background:rgba(13,17,23,.97);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:16px;z-index:1000;display:none;backdrop-filter:blur(12px)}
.vh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.vn{font-family:var(--mono);font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.vn .vn-dot{width:8px;height:8px;border-radius:50%}
.vs{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 10px;border-radius:4px}
.vx{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 6px;line-height:1;border-radius:4px}
.vx:hover{color:var(--t1);background:rgba(255,255,255,0.05)}
.vdv{height:1px;background:var(--border);margin:10px 0}
.vr{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;padding:3px 0}
.vr .vk{color:var(--t3)}.vr .vv{color:var(--t2)}
.vht{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:6px}
.vhi{font-family:var(--mono);font-size:10px;color:var(--t3);padding:2px 0}

#emb{position:absolute;top:0;left:0;right:0;height:40px;background:rgba(239,68,68,0.95);display:none;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;z-index:20;letter-spacing:.3px;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
#map-wrap.emergency{box-shadow:inset 0 0 80px rgba(239,68,68,0.15)}

@keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fl{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="map-wrap">
  <canvas id="cv"></canvas>
  <div id="emb"></div>
  <div id="vc">
    <div class="vh"><span class="vn" id="vcn"><span class="vn-dot" id="vcdot"></span><span id="vcnm"></span></span><div style="display:flex;align-items:center;gap:8px"><span class="vs" id="vcs"></span><button class="vx" id="vcx">&times;</button></div></div>
    <div class="vdv"></div><div id="vcd"></div><div class="vdv"></div>
    <div class="vht">TASK HISTORY</div><div id="vch"></div>
  </div>
</div>
<div id="right-panel">
  <div class="ps" id="dsp">
    <div class="ph"><div class="pt"><div class="ld"></div>AI DISPATCH</div><div class="pst" id="dss">Processing assignments...</div></div>
    <div id="inbound-section"><div class="iq-title">INBOUND QUEUE</div><div id="iq-list"></div></div>
    <div class="pb" id="dl"></div>
    <div id="nxt">NEXT DISPATCH IN <span id="dcd">8</span>s</div>
  </div>
  <div class="ps" id="flp">
    <div class="ph"><div class="pt">FLEET STATUS</div><div class="pst" id="fls">18 vehicles · 0 active</div></div>
    <div class="pb" id="fll"></div>
  </div>
</div>
<div id="kpi">
  <div class="kb"><div class="ld"></div>GROUNDCONTROL AI</div>
  <div class="kd"></div><div class="ki"><span class="kl">Active Vehicles</span><span class="kv" id="ka">0</span></div>
  <div class="kd"></div><div class="ki"><span class="kl">At Gates</span><span class="kv" id="kg">0</span></div>
  <div class="kd"></div><div class="ki"><span class="kl">Inbound</span><span class="kv" id="kin">0</span></div>
  <div class="kd"></div><div class="ki"><span class="kl">Violations</span><span class="kv" id="kvl">0</span></div>
  <div class="kd"></div><div class="ki"><span class="kl">Turnaround Avg</span><span class="kv" id="kta">--:--</span></div>
  <div class="kc" id="kcl">--:--:-- EST</div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CANVAS SETUP — fill entire map-wrap, no dead space
// ═══════════════════════════════════════════════════
const cv=document.getElementById('cv'), C=cv.getContext('2d'), wrap=document.getElementById('map-wrap');
let CW,CH,SX,SY;
const WW=1200,WH=800;
function resize(){
  const r=devicePixelRatio||1;CW=wrap.clientWidth;CH=wrap.clientHeight;
  cv.width=CW*r;cv.height=CH*r;cv.style.width=CW+'px';cv.style.height=CH+'px';
  C.setTransform(r,0,0,r,0,0);SX=CW/WW;SY=CH/WH; // stretch to fill — no letterboxing
}
window.addEventListener('resize',resize);resize();
function X(x){return x*SX}
function Y(y){return y*SY}
function S(v){return v*Math.min(SX,SY)}

// ═══════════════════════════════════════════════════
// AIRPORT LAYOUT (1200×800 logical, stretched to fill)
// Runways thin at top (~10%), terminal centered lower half, hub SE
// ═══════════════════════════════════════════════════
const RWY1={x:40,y:18,w:1120,h:16,label:'13L/31R',cx:600};
const RWY2={x:40,y:52,w:1120,h:16,cx:600};
const RWY2_LABEL='13R/31L';
const TWY_HOTEL={x:40,y:95,w:1120,h:12};
const APRON={x:150,y:140,w:800,h:280};
const TERM={x:120,y:470,w:880,h:70};
const N_SVC={x:120,y:440,w:880,h:8};
const S_SVC={x:120,y:560,w:880,h:8};
const HUB_BOX={x:920,y:590,w:200,h:140};

// Gates — A pier (west) and B pier (east) — ALL active
const GATES={
  A1:{pos:[230,230],active:true},A2:{pos:[340,230],active:true},A3:{pos:[450,230],active:true},
  B1:{pos:[600,230],active:true},B2:{pos:[710,230],active:true},B3:{pos:[820,230],active:true},
  B4:{pos:[880,230],active:true},B5:{pos:[940,230],active:true},
};
const ACTIVE_GATES=Object.keys(GATES).filter(k=>GATES[k].active);

const JETWAY_TOP=470; // terminal roof line
const JETWAY_BOT=270; // end of jetway arm near gate

// Hub parking: 5 cols × 4 rows fixed grid
const HUB_SLOTS=[];
for(let r=0;r<4;r++)for(let c=0;c<5;c++)HUB_SLOTS.push([HUB_BOX.x+22+c*36,HUB_BOX.y+18+r*30]);
const HUB_CENTER=[HUB_BOX.x+HUB_BOX.w/2,HUB_BOX.y+HUB_BOX.h/2];
const SVC_Y=445; // north service road centerline

// Geofence zones
const ZONES=[
  {label:'APRON ALPHA',x:APRON.x,y:APRON.y,w:APRON.w,h:APRON.h,fill:'rgba(59,130,246,0.05)',stroke:'rgba(59,130,246,0.25)',dash:null,lc:'#3B82F6'},
  {label:'RUNWAY BUFFER',x:40,y:78,w:1120,h:8,fill:'rgba(239,68,68,0.06)',stroke:'rgba(239,68,68,0.2)',dash:[8,5],lc:'#EF4444'},
  {label:'CATERING',x:30,y:250,w:100,h:160,fill:'rgba(139,92,246,0.05)',stroke:'rgba(139,92,246,0.2)',dash:null,lc:'#8B5CF6'},
  {label:'FUEL DEPOT',x:1040,y:250,w:120,h:140,fill:'rgba(239,68,68,0.05)',stroke:'rgba(239,68,68,0.2)',dash:null,lc:'#EF4444'},
  {label:'VEHICLE HUB',x:HUB_BOX.x-8,y:HUB_BOX.y-8,w:HUB_BOX.w+16,h:HUB_BOX.h+16,fill:'rgba(16,185,129,0.04)',stroke:'rgba(16,185,129,0.2)',dash:[6,4],lc:'#10B981'},
];

// ═══════════════════════════════════════════════════
// VEHICLE + SIM CONFIG
// ═══════════════════════════════════════════════════
const TICK=100, DISP_INT=8, EM_FIRST=30, EM_REPEAT=300, EM_DUR=25;
const MOVE_SPD=2.6, SLOW_SPD=0.8, ARFF_SPD=5.5;
const AC_FAST=6.0, AC_MED=2.8, AC_SLOW=1.0; // aircraft speeds: runway/taxi/gate approach (~8s arrival)

const VTYPES={
  BAG:{color:'#F59E0B',name:'Baggage Tug',dur:100},FUEL:{color:'#EF4444',name:'Fuel Truck',dur:120},
  CAT:{color:'#8B5CF6',name:'Catering Lift',dur:90},TUG:{color:'#3B82F6',name:'Pushback Tractor',dur:30},
  GPU:{color:'#10B981',name:'Ground Power',dur:60},H2O:{color:'#06B6D4',name:'Water Service',dur:70},
  ARFF:{color:'#FF3B3B',name:'ARFF/Emergency',dur:0},
};
const FLEET=['BAG-01','BAG-02','BAG-03','BAG-04','FUEL-01','FUEL-02','FUEL-03','CAT-01','CAT-02','CAT-03','TUG-01','TUG-02','TUG-03','GPU-01','GPU-02','H2O-01','ARFF-01','ARFF-02'];
const DRIVERS=['Marcus Webb','Sarah Chen','James Rodriguez','Aisha Patel','Derek Okafor','Lisa Huang','Tom Kowalski','Nina Vasquez','Ray Mitchell','Eva Lindström','Chris Adeyemi','Priya Sharma','Mike Torres','Yuki Tanaka','Jordan Blake','Sam Okonkwo','Alex Petrov','Dana Kim'];
const AIRLINES=[{code:'AA',color:'#CC0000'},{code:'UA',color:'#003087'},{code:'DL',color:'#003366'},{code:'WN',color:'#FF6600'},{code:'B6',color:'#00B2A9'}];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let simT=0,dispCD=DISP_INT,selId=null;
let vehs={},gateS={};
let inboundQ=[],dispLog=[],turnTimes=[];
let emActive=false,emTimer=0,nextEm=EM_FIRST;
let aiIdx=0,flNum=100;

// ── Runway Safety System state ──
let rwy1State='CLEAR',rwy2State='CLEAR'; // CLEAR | APPROACH_90 | APPROACH_30
let rwy1ETA=0,rwy2ETA=0;
let heldVehicles=new Set();
let conflictCooldown=0;
let transponderLost=null; // vehicle id with lost transponder
let transponderLostTimer=0;

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════
function dist(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1])}
function lerp2(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t]}
function fmt(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+String(ss).padStart(2,'0')}
function clk(){const b=14*3600+31*60+Math.floor(simT);const h=Math.floor(b/3600)%24,m=Math.floor(b%3600/60),s=b%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function nxtAl(){const a=AIRLINES[aiIdx%AIRLINES.length];aiIdx++;return a}
function nxtFl(al){flNum+=Math.floor(Math.random()*80)+20;return al.code+' '+flNum}
function rndDelay(){return 120+Math.random()*120}

// ── Routing (pixel coords, L-shaped) ──
// Catering zone pickup point
const CAT_PICKUP=[80,330];

function routeToGate(gid,vtype){
  const g=GATES[gid].pos;
  if(vtype==='CAT'){
    // Route through catering staging area first
    return[null,[HUB_CENTER[0],SVC_Y],[CAT_PICKUP[0],SVC_Y],[CAT_PICKUP[0],CAT_PICKUP[1]],[CAT_PICKUP[0],SVC_Y],[g[0],SVC_Y],[g[0],g[1]]];
  }
  return[null,[HUB_CENTER[0],SVC_Y],[g[0],SVC_Y],[g[0],g[1]]];
}
function routeFromGate(gid){
  const g=GATES[gid].pos;
  return[[g[0],g[1]],[g[0],SVC_Y],[HUB_CENTER[0],SVC_Y],null];
}
// Taxiway connector x-positions (match gate columns, used for turnoffs)
const CONNS=[230,340,450,600,710,820,880,940];
const RWY_CY=RWY1.y+RWY1.h/2;
const TWY_CY=TWY_HOTEL.y+TWY_HOTEL.h/2;
const LEADOFF_Y=(RWY2.y+RWY2.h+TWY_HOTEL.y)/2; // midpoint between rwy2 and hotel

function routeARFF(from){return[[...from],[600,TWY_CY],[600,RWY_CY]]}

// Aircraft arrival: enter east on RWY1, decel, turn off at nearest connector, taxi Hotel, south to gate
function routeAcArr(gid){
  const g=GATES[gid].pos;
  const near=CONNS.reduce((a,b)=>Math.abs(b-g[0])<Math.abs(a-g[0])?b:a);
  return[
    [near,0],                    // appear top of canvas on runway centerline
    [near,RWY_CY],               // fast descent along runway
    [near,LEADOFF_Y],            // lead-off south
    [near,TWY_CY],               // onto taxiway Hotel
    [g[0],TWY_CY],               // east/west along Hotel
    [g[0],APRON.y+10],           // south into apron
    [g[0],g[1]],                 // dock at gate (very slow)
  ];
}
// Aircraft departure: pushback south, taxi to Hotel, east to connector, north onto runway, accelerate out
function routeAcDep(gid){
  const g=GATES[gid].pos;
  const near=CONNS.reduce((a,b)=>Math.abs(b-g[0])<Math.abs(a-g[0])?b:a);
  return[
    [g[0],g[1]],               // at gate
    [g[0],g[1]+35],            // pushback south (very slow, facing north)
    [g[0],APRON.y+10],         // clear apron
    [g[0],TWY_CY],             // onto taxiway
    [near,TWY_CY],             // along Hotel to connector
    [near,LEADOFF_Y],          // north onto lead-off
    [near,RWY_CY],             // onto runway
    [RWY1.x-40,RWY_CY],       // accelerate west, exit
  ];
}
function acSegSpeed(segIdx,total,departing){
  if(departing){
    if(segIdx<=1)return AC_SLOW*0.35; // pushback
    if(segIdx>=total-2)return AC_FAST; // runway accel
    return AC_MED;
  }
  if(segIdx===0)return AC_FAST; // landing roll
  if(segIdx>=total-2)return AC_SLOW; // gate approach
  return AC_MED;
}

// ═══════════════════════════════════════════════════
// VEHICLE SYSTEM (identical logic, pixel coords)
// ═══════════════════════════════════════════════════
function mkVeh(id,i){
  const t=id.split('-')[0],td=VTYPES[t];
  const hp=HUB_SLOTS[i%HUB_SLOTS.length];
  return{id,type:t,color:td.color,tname:td.name,driver:DRIVERS[i],
    state:'IDLE',pos:[...hp],hub:[...hp],
    route:null,ri:0,rp:0,gate:null,task:null,
    svcT:0,svcDur:td.dur,trT:0,heading:0,speed:0,
    hist:[],wobble:Math.random()*Math.PI*2};
}
function moveRoute(v){
  if(!v.route||v.ri>=v.route.length-1)return true;
  const f=v.route[v.ri],t=v.route[v.ri+1],d=dist(f,t);
  if(d<0.5){v.ri++;return false}
  const last=v.ri===v.route.length-2;
  const spd=v.state==='EMERGENCY'?ARFF_SPD:(last&&v.rp>0.6)?SLOW_SPD:MOVE_SPD;
  v.speed=spd*0.67;v.rp+=spd/d;
  if(v.rp>=1){v.pos=[...t];v.rp=0;v.ri++;return v.ri>=v.route.length-1}
  v.pos=lerp2(f,t,v.rp);v.heading=Math.atan2(t[1]-f[1],t[0]-f[0]);
  return false;
}
function dispatchV(v,gid,task){
  v.state='DISPATCHED';v.gate=gid;v.task=task;
  const r=routeToGate(gid,v.type);r[0]=[...v.pos];
  v.route=r;v.ri=0;v.rp=0;v.trT=0;
  addLog(v.id+' → Gate '+gid,'a',task);
}
function returnV(v){
  v.state='RETURNING';
  const r=v.gate?routeFromGate(v.gate):[[...v.pos],[...v.hub]];
  if(!r[0])r[0]=[...v.pos];r[r.length-1]=[...v.hub];
  v.route=r;v.ri=0;v.rp=0;v.trT=0;v.task=null;
}
function tickV(v,dt){
  v.wobble+=dt*2.5;
  if(v.state==='IDLE'){v.speed=0;return}
  if(v.state==='DISPATCHED'||v.state==='EMERGENCY'){
    v.trT+=dt;
    if(moveRoute(v)){
      if(v.state==='EMERGENCY'){v.state='IDLE';v.speed=0;return}
      v.state='SERVICING';v.svcT=0;v.pos=[...GATES[v.gate].pos];v.speed=0;
      addLog(v.id+' docked at '+v.gate,'c','Servicing');
    }return;
  }
  if(v.state==='SERVICING'){
    v.svcT+=dt;v.speed=0;
    if(v.svcT>=v.svcDur){
      v.hist.unshift({gate:v.gate,t:simT});if(v.hist.length>5)v.hist.pop();
      addLog(v.id+' '+v.gate+' — '+v.tname,'c','Complete');
      const gid=v.gate;returnV(v);checkTurn(gid);
    }return;
  }
  if(v.state==='RETURNING'){v.trT+=dt;if(moveRoute(v)){v.state='IDLE';v.pos=[...v.hub];v.gate=null;v.route=null;v.speed=0}return}
  if(v.state==='VIOLATION'||v.state==='HOLD')v.speed=0;
}

// ═══════════════════════════════════════════════════
// GATE & AIRCRAFT (identical logic)
// ═══════════════════════════════════════════════════
function mkGate(id){return{id,state:'EMPTY',ac:null,assigned:[],needed:[],turnStart:0,nextArr:0,acPos:null,acRoute:null,acRi:0,acRp:0,acHead:0}}
function spawnArr(gid){
  const gs=gateS[gid],al=nxtAl(),fl=nxtFl(al);
  gs.state='ARRIVING';gs.ac={flight:fl,airline:al.code,color:al.color};
  gs.acRoute=routeAcArr(gid);gs.acRi=0;gs.acRp=0;gs.acHead=0;
  gs.acPos=[...gs.acRoute[0]];
  gs.assigned=[];gs.needed=['GPU','FUEL','BAG','CAT'];
  if(Math.random()>.5)gs.needed.push('H2O');
  addLog(fl+' inbound → Gate '+gid,'a','Arriving');
}
function moveAcRoute(gs,spd){
  if(!gs.acRoute||gs.acRi>=gs.acRoute.length-1)return true;
  const f=gs.acRoute[gs.acRi],t=gs.acRoute[gs.acRi+1],d=dist(f,t);
  if(d<0.5){gs.acRi++;return false}
  gs.acRp+=spd/d;
  // Heading: atan2(dx, -dy) so 0=north, CW positive
  gs.acHead=Math.atan2(t[0]-f[0],-(t[1]-f[1]));
  if(gs.acRp>=1){gs.acPos=[...t];gs.acRp=0;gs.acRi++;return gs.acRi>=gs.acRoute.length-1}
  gs.acPos=lerp2(f,t,gs.acRp);return false;
}
function tickGate(gs,dt){
  if(gs.state==='ARRIVING'){
    const total=gs.acRoute?gs.acRoute.length:2;
    const spd=acSegSpeed(gs.acRi,total,false);
    if(moveAcRoute(gs,spd)){
      gs.state='AT_GATE';gs.turnStart=simT;gs.acPos=[...GATES[gs.id].pos];gs.acHead=0;
      addLog(gs.ac.flight+' at Gate '+gs.id,'c','At Gate');reqSvc(gs.id);
    }return;
  }
  if(gs.state==='DEPARTING'){
    const total=gs.acRoute?gs.acRoute.length:2;
    const spd=acSegSpeed(gs.acRi,total,true);
    if(moveAcRoute(gs,spd)){
      gs.state='EMPTY';gs.ac=null;gs.acPos=null;gs.acHead=0;
      gs.nextArr=simT+rndDelay();addLog('Gate '+gs.id+' clear — cycling','w','Cycling');return;
    }return;
  }
  if(gs.state==='EMPTY'&&gs.nextArr&&simT>=gs.nextArr){spawnArr(gs.id);gs.nextArr=0}
}
function checkTurn(gid){
  const gs=gateS[gid];if(gs.state!=='AT_GATE')return;
  const still=Object.values(vehs).filter(v=>v.gate===gid&&(v.state==='DISPATCHED'||v.state==='SERVICING'));
  if(still.length>0||gs.needed.length>0)return;
  const hadTug=gs.assigned.some(id=>id.startsWith('TUG'));
  if(!hadTug){const tug=findIdle('TUG');if(tug){dispatchV(tug,gid,'Pushback');gs.assigned.push(tug.id)}return}
  const tugBusy=Object.values(vehs).find(v=>v.gate===gid&&v.type==='TUG'&&(v.state==='DISPATCHED'||v.state==='SERVICING'));
  if(tugBusy)return;
  gs.state='DEPARTING';gs.acRoute=routeAcDep(gid);gs.acRi=0;gs.acRp=0;
  const el=simT-gs.turnStart;turnTimes.push(el);if(turnTimes.length>5)turnTimes.shift();
  addLog(gs.ac.flight+' pushback — '+fmt(el),'c','Departing');
}
function reqSvc(gid){
  const gs=gateS[gid],need=[...gs.needed];
  need.forEach(type=>{const v=findIdle(type);if(v){dispatchV(v,gid,v.tname+' · '+gs.ac.flight);gs.assigned.push(v.id);gs.needed=gs.needed.filter(t=>t!==type)}});
}
function findIdle(type){return Object.values(vehs).find(v=>v.type===type&&v.state==='IDLE')}

// ═══════════════════════════════════════════════════
// INBOUND, DISPATCH, EMERGENCY (identical)
// ═══════════════════════════════════════════════════
function tickInbound(){
  while(inboundQ.length<2){const al=nxtAl(),fl=nxtFl(al);const eta=120+Math.random()*180;inboundQ.push({flight:fl,color:al.color,eta,maxEta:eta,gate:null})}
  inboundQ.forEach(q=>{q.eta-=TICK/1000});
  inboundQ.forEach(q=>{if(!q.gate){const empty=ACTIVE_GATES.find(gid=>{const gs=gateS[gid];return gs.state==='EMPTY'&&gs.nextArr>0&&!inboundQ.some(iq=>iq.gate===gid&&iq!==q)});if(empty)q.gate=empty}});
}
function runDispatch(){ACTIVE_GATES.forEach(gid=>{const gs=gateS[gid];if(gs.state==='AT_GATE'&&gs.needed.length>0)reqSvc(gid);if(gs.state==='EMPTY'&&!gs.nextArr)gs.nextArr=simT+rndDelay()})}
function triggerEm(){
  if(emActive)return;emActive=true;emTimer=0;
  const f2=vehs['FUEL-02'];
  if(f2){f2.state='VIOLATION';f2.pos=[600,85];f2.gate=null;f2.task=null;f2.route=null;addLog('FUEL-02 entered runway buffer','v','VIOLATION')}
  ['ARFF-01','ARFF-02'].forEach(id=>{const v=vehs[id];if(!v)return;v.state='EMERGENCY';v.route=routeARFF(v.pos);v.ri=0;v.rp=0;addLog(v.id+' → RWY 13L threshold','e','EMERGENCY')});
  addLog('EMERGENCY OVERRIDE — all traffic hold','e','ALERT');addLog('Rerouting ground traffic — runway buffer compromised','e','OVERRIDE');
  const b=document.getElementById('emb');b.textContent='⚠  EMERGENCY — FUEL-02 RUNWAY INCURSION — ARFF UNITS RESPONDING';b.style.display='flex';
  document.getElementById('map-wrap').classList.add('emergency');
}
function resolveEm(){
  emActive=false;const f2=vehs['FUEL-02'];
  if(f2){f2.state='RETURNING';f2.route=[[...f2.pos],[...f2.hub]];f2.ri=0;f2.rp=0;addLog('FUEL-02 rerouted — violation cleared','c','Cleared')}
  ['ARFF-01','ARFF-02'].forEach(id=>{const v=vehs[id];if(!v||v.state==='IDLE')return;v.state='RETURNING';v.route=[[...v.pos],[...v.hub]];v.ri=0;v.rp=0});
  addLog('Emergency resolved — normal operations resumed','c','ALL CLEAR');
  document.getElementById('emb').style.display='none';document.getElementById('map-wrap').classList.remove('emergency');nextEm=simT+EM_REPEAT;
  // Restore transponder after emergency
  if(transponderLost){transponderLost=null;transponderLostTimer=0}
}

// ═══════════════════════════════════════════════════
// RUNWAY SAFETY SYSTEM (LaGuardia NTSB features)
// ═══════════════════════════════════════════════════
function tickRunwaySafety(dt){
  // Feature 1: Active runway lock with approach zones
  // Check if any aircraft is arriving (on runway segments = acRi < 2)
  let r1Active=false,r1Eta=0;
  Object.values(gateS).forEach(gs=>{
    if(gs.state==='ARRIVING'&&gs.acRoute&&gs.acRi<=1){
      r1Active=true;
      // Estimate ETA: remaining distance at current speed
      let rem=0;
      for(let i=gs.acRi;i<gs.acRoute.length-1;i++)rem+=dist(gs.acRoute[i],gs.acRoute[i+1]);
      r1Eta=Math.max(0,rem/AC_FAST*0.1); // rough seconds estimate
    }
    if(gs.state==='DEPARTING'&&gs.acRoute&&gs.acRi>=gs.acRoute.length-3){
      r1Active=true;r1Eta=5; // departing on runway
    }
  });

  if(r1Active){
    rwy1State=r1Eta>9?'APPROACH_90':'APPROACH_30';
    rwy1ETA=r1Eta;
  }else{
    rwy1State='CLEAR';rwy1ETA=0;
    // Release held vehicles
    heldVehicles.forEach(vid=>{
      const v=vehs[vid];
      if(v&&v.state==='HOLD'){v.state='DISPATCHED';addLog(v.id+' released — runway clear','c','RELEASED')}
    });
    heldVehicles.clear();
  }

  // RWY2 mirrors RWY1 state with slight offset for visual variety
  rwy2State=rwy1State==='CLEAR'?'CLEAR':(rwy1ETA>12?'APPROACH_90':'APPROACH_30');
  rwy2ETA=Math.max(0,rwy1ETA+3);

  // Hold vehicles whose position is in the runway zone (y < LEADOFF_Y)
  if(rwy1State!=='CLEAR'){
    Object.values(vehs).forEach(v=>{
      if(v.state==='DISPATCHED'&&v.pos[1]<LEADOFF_Y&&!heldVehicles.has(v.id)){
        v.state='HOLD';heldVehicles.add(v.id);
        addLog('\u26D4 HOLD — RWY ACTIVE — '+v.id,'e','HOLD');
      }
    });
  }

  // Feature 2: Conflict detection — fire once per dispatch cycle
  conflictCooldown-=dt;
  if(conflictCooldown<=0&&rwy1State!=='CLEAR'){
    // Check if any dispatched vehicle route crosses runway zone
    Object.values(vehs).forEach(v=>{
      if(v.state!=='DISPATCHED'||!v.route||heldVehicles.has(v.id))return;
      const crossesRwy=v.route.some(wp=>wp&&wp[1]<RWY2.y+RWY2.h+10);
      if(crossesRwy){
        addLog('\u26A0 CONFLICT DETECTED — rerouting '+v.id,'e','CONFLICT');
        // Reroute: skip waypoints in runway zone (the route already avoids runway for non-ARFF)
        conflictCooldown=DISP_INT; // one per dispatch cycle
      }
    });
    if(conflictCooldown<=0)conflictCooldown=DISP_INT;
  }

  // Feature 3: Transponder simulation
  // During emergency, FUEL-02 loses transponder for 8 seconds
  if(emActive&&emTimer>=2&&emTimer<10){
    if(transponderLost!=='FUEL-02'){
      transponderLost='FUEL-02';transponderLostTimer=0;
      addLog('\u26A0 TRANSPONDER LOSS — FUEL-02 — signal lost','e','XPDR LOSS');
    }
    transponderLostTimer+=dt;
  }else if(emActive&&emTimer>=10&&transponderLost==='FUEL-02'){
    addLog('FUEL-02 transponder restored — '+Math.round(transponderLostTimer)+'s outage','c','XPDR OK');
    transponderLost=null;transponderLostTimer=0;
  }
}

// ═══════════════════════════════════════════════════
// CANVAS RENDER — AIRPORT DIAGRAM
// ═══════════════════════════════════════════════════
function render(){
  C.clearRect(0,0,CW,CH);
  C.fillStyle='#0a0e1a';C.fillRect(0,0,CW,CH);

  // Apron surface (distinct blue-tinted concrete)
  const ax=X(APRON.x),ay=Y(APRON.y),aw=X(APRON.x+APRON.w)-ax,ah=Y(APRON.y+APRON.h)-ay;
  C.fillStyle='#111827';C.fillRect(ax,ay,aw,ah);
  // Tarmac grid lines
  C.strokeStyle='rgba(59,130,246,0.022)';C.lineWidth=1;
  const gsp=S(28);
  if(gsp>3){for(let gx=ax;gx<ax+aw;gx+=gsp){C.beginPath();C.moveTo(gx,ay);C.lineTo(gx,ay+ah);C.stroke()}
    for(let gy=ay;gy<ay+ah;gy+=gsp){C.beginPath();C.moveTo(ax,gy);C.lineTo(ax+aw,gy);C.stroke()}}

  // Zones (labels top-left inside, brighter)
  ZONES.forEach(z=>{
    const zx=X(z.x),zy=Y(z.y),zw=X(z.x+z.w)-zx,zh=Y(z.y+z.h)-zy;
    C.fillStyle=z.fill;C.fillRect(zx,zy,zw,zh);
    C.strokeStyle=z.stroke;C.lineWidth=S(1.2);
    if(z.dash)C.setLineDash(z.dash.map(d=>S(d)));else C.setLineDash([]);
    C.strokeRect(zx,zy,zw,zh);C.setLineDash([]);
    C.font=S(7.5)+'px "JetBrains Mono"';C.fillStyle=z.lc;C.globalAlpha=0.55;C.textAlign='left';
    C.fillText(z.label,zx+S(6),zy+S(12));C.globalAlpha=1;
  });

  // ── Surface: Runways (darkest) ──
  [RWY1,RWY2].forEach((r,ri)=>{
    const rx=X(r.x),ry=Y(r.y),rw=X(r.x+r.w)-rx,rh=Y(r.y+r.h)-ry;
    C.fillStyle='#0d1520';C.fillRect(rx,ry,rw,rh);
    C.strokeStyle='rgba(255,255,255,0.05)';C.lineWidth=1;C.strokeRect(rx,ry,rw,rh);
    // Bright centerline
    C.strokeStyle='rgba(255,255,255,0.45)';C.lineWidth=Math.max(1,S(1.2));C.setLineDash([S(10),S(8)]);
    C.beginPath();C.moveTo(rx+S(15),ry+rh/2);C.lineTo(rx+rw-S(15),ry+rh/2);C.stroke();C.setLineDash([]);
    // Threshold bars (thick white across full width)
    C.fillStyle='rgba(255,255,255,0.4)';
    for(let i=0;i<4;i++){C.fillRect(rx+S(5),ry+S(1.5+i*3.5),S(3),S(2));C.fillRect(rx+rw-S(8),ry+S(1.5+i*3.5),S(3),S(2))}
    // Touchdown zone bars (pairs of rectangles)
    C.fillStyle='rgba(255,255,255,0.2)';
    for(let i=0;i<3;i++){const bx=rx+S(40+i*30);C.fillRect(bx,ry+S(3),S(8),S(2));C.fillRect(bx,ry+rh-S(5),S(8),S(2))}
    const lbl=ri===0?RWY1.label:RWY2_LABEL;
    C.font='bold '+S(7)+'px "JetBrains Mono"';C.fillStyle='rgba(255,255,255,0.16)';C.textAlign='center';
    C.fillText(lbl,rx+rw/2,ry+rh/2+S(3));
  });

  // ── Runway lock overlay (amber at 90s, red at 30s) ──
  if(rwy1State!=='CLEAR'){
    const lockColor=rwy1State==='APPROACH_30'?'rgba(239,68,68,':'rgba(245,158,11,';
    const pulse=0.08+Math.sin(simT*3)*0.04;
    [RWY1,RWY2].forEach(r=>{
      C.fillStyle=lockColor+pulse+')';
      C.fillRect(X(r.x),Y(r.y),X(r.x+r.w)-X(r.x),Y(r.y+r.h)-Y(r.y));
    });
  }

  // ── Surface: Taxiway Hotel (lighter than runway) ──
  const tx=X(TWY_HOTEL.x),ty=Y(TWY_HOTEL.y),tw=X(TWY_HOTEL.x+TWY_HOTEL.w)-tx,th=Y(TWY_HOTEL.y+TWY_HOTEL.h)-ty;
  C.fillStyle='#141e2d';C.fillRect(tx,ty,tw,th);
  // Yellow centerline
  C.strokeStyle='rgba(245,200,50,0.35)';C.lineWidth=Math.max(1,S(0.8));C.setLineDash([S(4),S(4)]);
  C.beginPath();C.moveTo(tx,ty+th/2);C.lineTo(tx+tw,ty+th/2);C.stroke();C.setLineDash([]);
  C.font=S(6)+'px "JetBrains Mono"';C.fillStyle='rgba(245,200,50,0.2)';C.textAlign='left';
  C.fillText('TWY H',tx+S(5),ty+th/2+S(2.5));

  // ── Connectors (runway → hotel) with holding short lines ──
  CONNS.forEach(cx=>{
    const cxL=X(cx-4),cxR=X(cx+4),cyTop=Y(RWY2.y+RWY2.h),cyBot=Y(TWY_HOTEL.y);
    C.fillStyle='#141e2d';C.fillRect(cxL,cyTop,cxR-cxL,cyBot-cyTop);
    // Holding short position: double yellow line before runway entry
    const hsY=Y(RWY2.y+RWY2.h+2);
    C.strokeStyle='rgba(245,200,50,0.4)';C.lineWidth=Math.max(1,S(0.6));C.setLineDash([]);
    C.beginPath();C.moveTo(cxL-S(1),hsY);C.lineTo(cxR+S(1),hsY);C.stroke();
    C.beginPath();C.moveTo(cxL-S(1),hsY+S(2));C.lineTo(cxR+S(1),hsY+S(2));C.stroke();
  });

  // ── Apron connectors (hotel → gate apron) ──
  CONNS.forEach(cx=>{
    C.fillStyle='#111827';C.fillRect(X(cx-3),Y(TWY_HOTEL.y+TWY_HOTEL.h),X(cx+3)-X(cx-3),Y(APRON.y)-Y(TWY_HOTEL.y+TWY_HOTEL.h));
  });

  // North service road — visible stripe
  const nsx=X(N_SVC.x),nsy=Y(N_SVC.y),nsw=X(N_SVC.x+N_SVC.w)-nsx,nsh=Y(N_SVC.y+N_SVC.h)-nsy;
  C.fillStyle='rgba(148,163,184,0.07)';C.fillRect(nsx,nsy,nsw,nsh);
  C.strokeStyle='rgba(148,163,184,0.1)';C.lineWidth=1;
  C.setLineDash([S(3),S(3)]);C.beginPath();C.moveTo(nsx,nsy+nsh/2);C.lineTo(nsx+nsw,nsy+nsh/2);C.stroke();C.setLineDash([]);

  // South service road
  const ssx=X(S_SVC.x),ssy=Y(S_SVC.y),ssw=X(S_SVC.x+S_SVC.w)-ssx,ssh=Y(S_SVC.y+S_SVC.h)-ssy;
  C.fillStyle='rgba(148,163,184,0.04)';C.fillRect(ssx,ssy,ssw,ssh);

  // Terminal building
  const tmx=X(TERM.x),tmy=Y(TERM.y),tmw=X(TERM.x+TERM.w)-tmx,tmh=Y(TERM.y+TERM.h)-tmy;
  C.fillStyle='#1a2535';
  C.beginPath();C.roundRect(tmx,tmy,tmw,tmh,S(3));C.fill();
  C.strokeStyle='rgba(59,130,246,0.22)';C.lineWidth=S(1.5);
  C.beginPath();C.roundRect(tmx,tmy,tmw,tmh,S(3));C.stroke();
  // Lit windows — small bright rectangles along face
  const winCount=Math.floor(TERM.w/18);
  for(let i=0;i<winCount;i++){const wwx=TERM.x+10+i*18;
    const bright=0.06+Math.sin(simT*1.2+i*0.7)*0.025+Math.sin(simT*0.3+i*2.1)*0.015;
    C.fillStyle='rgba(180,200,255,'+bright+')';C.fillRect(X(wwx),tmy+S(8),S(8),S(4));
    C.fillRect(X(wwx),tmy+tmh-S(14),S(8),S(4));
  }
  C.font='bold '+S(10)+'px Inter';C.fillStyle='rgba(255,255,255,0.12)';C.textAlign='center';
  C.fillText('TERMINAL 4',tmx+tmw/2,tmy+tmh/2+S(3));

  // Jetways — long arms from terminal to near gate
  Object.entries(GATES).forEach(([id,g])=>{
    const gx=X(g.pos[0]),jTop=Y(JETWAY_TOP),jBot=Y(JETWAY_BOT);
    C.strokeStyle='rgba(148,163,184,0.18)';C.lineWidth=S(2.5);
    C.beginPath();C.moveTo(gx,jTop);C.lineTo(gx,jBot);C.stroke();
    C.fillStyle='rgba(148,163,184,0.12)';C.fillRect(gx-S(4),jBot-S(2),S(8),S(5));
    C.font='bold '+S(7.5)+'px "JetBrains Mono"';C.fillStyle=g.active?'rgba(59,130,246,0.5)':'rgba(100,116,139,0.2)';
    C.textAlign='center';C.fillText(id,gx,jBot+S(14));
  });

  // Hub box
  C.strokeStyle='rgba(16,185,129,0.15)';C.lineWidth=S(1);C.setLineDash([S(4),S(4)]);
  C.strokeRect(X(HUB_BOX.x),Y(HUB_BOX.y),X(HUB_BOX.x+HUB_BOX.w)-X(HUB_BOX.x),Y(HUB_BOX.y+HUB_BOX.h)-Y(HUB_BOX.y));
  C.setLineDash([]);
  C.font=S(7)+'px "JetBrains Mono"';C.fillStyle='rgba(16,185,129,0.22)';C.textAlign='center';
  C.fillText('VEHICLE HUB',X(HUB_BOX.x+HUB_BOX.w/2),Y(HUB_BOX.y)-S(4));

  // Pier labels
  C.font='bold '+S(8)+'px "JetBrains Mono"';C.fillStyle='rgba(59,130,246,0.12)';C.textAlign='center';
  C.fillText('A PIER',X(340),Y(160));C.fillText('B PIER',X(790),Y(160));

  // ── Route lines — all dispatched + selected ──
  Object.values(vehs).forEach(v=>{
    if(!v.route||(v.state!=='DISPATCHED'&&v.state!=='RETURNING'&&v.id!==selId))return;
    const isSel=v.id===selId;
    C.strokeStyle=v.color;C.lineWidth=S(isSel?2:1.2);C.globalAlpha=isSel?0.5:0.22;
    C.setLineDash([S(4),S(5)]);if(isSel)C.lineDashOffset=-simT*40;
    C.beginPath();C.moveTo(X(v.pos[0]),Y(v.pos[1]));
    for(let i=v.ri+1;i<v.route.length;i++)if(v.route[i])C.lineTo(X(v.route[i][0]),Y(v.route[i][1]));
    C.stroke();C.setLineDash([]);C.globalAlpha=1;
  });

  // ── Aircraft (rotated to heading, airline tail color, exhaust shimmer) ──
  Object.values(gateS).forEach(gs=>{
    if(!gs.acPos||!gs.ac)return;
    const sx=X(gs.acPos[0]),sy=Y(gs.acPos[1]),bl=S(13),bw=S(2.2),wing=S(12);
    const isDep=gs.state==='DEPARTING'&&gs.acRi>=2; // past pushback = engines on
    C.save();C.translate(sx,sy);C.rotate(gs.acHead||0);
    // Exhaust shimmer (behind engines during departure)
    if(isDep){
      for(let i=0;i<3;i++){
        const ey=bl+S(4+i*5),er=S(2.5-i*0.6),ea=0.15-i*0.04+Math.sin(simT*10+i*2)*0.05;
        if(er>0&&ea>0){C.globalAlpha=ea;C.fillStyle='rgba(180,200,255,0.6)';
          C.beginPath();C.arc(-S(4),ey,er,0,Math.PI*2);C.fill();
          C.beginPath();C.arc(S(4),ey,er,0,Math.PI*2);C.fill();C.globalAlpha=1}
      }
    }
    C.shadowColor='rgba(255,255,255,0.18)';C.shadowBlur=S(4);
    C.fillStyle='rgba(220,225,235,0.85)';
    // Fuselage
    C.beginPath();C.ellipse(0,0,bw,bl,0,0,Math.PI*2);C.fill();
    // Wings
    C.beginPath();C.moveTo(0,-S(0.8));C.lineTo(-wing,S(2));C.lineTo(-wing,S(3.2));C.lineTo(0,S(0.8));C.lineTo(wing,S(3.2));C.lineTo(wing,S(2));C.closePath();C.fill();
    // Tail fins
    C.beginPath();C.moveTo(0,bl-S(1.5));C.lineTo(-S(4.5),bl+S(1.5));C.lineTo(S(4.5),bl+S(1.5));C.closePath();C.fill();
    // Airline tail color — small colored rectangle on tail
    C.fillStyle=gs.ac.color;
    C.fillRect(-S(2.5),bl-S(2),S(5),S(4));
    C.shadowBlur=0;C.restore();
    // Callsign below with airline dot
    C.font='bold '+S(5.5)+'px "JetBrains Mono"';C.textAlign='center';
    const ly=sy+S(20);
    C.fillStyle=gs.ac.color;C.beginPath();C.arc(sx-S(16),ly-S(1.5),S(2),0,Math.PI*2);C.fill();
    C.fillText(gs.ac.flight,sx+S(2),ly);
  });

  // ── Vehicles ──
  Object.values(vehs).forEach(v=>{
    const sx=X(v.pos[0]),sy=Y(v.pos[1]),r=S(4.5);
    C.shadowColor=v.color;C.shadowBlur=S(5);
    if(v.state==='VIOLATION'){
      const pr=S(9+Math.sin(simT*8)*4);
      C.strokeStyle='rgba(239,68,68,'+(0.4+Math.sin(simT*8)*0.4)+')';C.lineWidth=S(1.5);
      C.beginPath();C.arc(sx,sy,pr,0,Math.PI*2);C.stroke();
      C.fillStyle='#EF4444';C.beginPath();C.arc(sx,sy,r*0.6,0,Math.PI*2);C.fill();
    }else{
      C.fillStyle=v.color;if(v.state==='IDLE')C.globalAlpha=0.4;
      C.beginPath();C.arc(sx,sy,r,0,Math.PI*2);C.fill();C.globalAlpha=1;
      if(v.state!=='IDLE'){
        const p=0.8+Math.sin(v.wobble)*0.2;C.strokeStyle=v.color;C.globalAlpha=0.2*p;C.lineWidth=S(1.2);
        C.beginPath();C.arc(sx,sy,r*1.5*p,0,Math.PI*2);C.stroke();C.globalAlpha=1;
      }
      if(v.type==='ARFF'&&v.state==='EMERGENCY'){
        const flash=Math.sin(simT*14)>0;C.fillStyle=flash?'#fff':'#ff0000';
        C.beginPath();C.arc(sx-S(2),sy-S(2),S(2),0,Math.PI*2);C.fill();
        C.fillStyle=flash?'#ff0000':'#fff';
        C.beginPath();C.arc(sx+S(2),sy-S(2),S(2),0,Math.PI*2);C.fill();
      }
    }
    C.shadowBlur=0;
    // Transponder dot (tiny green = active, red = lost)
    const xpdrLost=transponderLost===v.id;
    const xpdrColor=xpdrLost?(Math.sin(simT*10)>0?'#EF4444':'transparent'):'#10B981';
    if(xpdrColor!=='transparent'){C.fillStyle=xpdrColor;C.beginPath();C.arc(sx+r+S(2),sy-r,S(1.8),0,Math.PI*2);C.fill()}
    // Label
    C.font=S(6)+'px "JetBrains Mono"';C.fillStyle=v.state==='IDLE'?'rgba(255,255,255,0.2)':v.state==='HOLD'?'rgba(239,68,68,0.7)':'rgba(255,255,255,0.5)';C.textAlign='center';
    C.fillText(v.state==='HOLD'?'\u26D4 '+v.id:v.id,sx,sy-S(7));
    if(v.id===selId){C.strokeStyle='#fff';C.lineWidth=S(1.2);C.globalAlpha=0.5;C.beginPath();C.arc(sx,sy,r+S(3),0,Math.PI*2);C.stroke();C.globalAlpha=1}
  });

  // ── Runway Safety System info panel (bottom-left) ──
  const pnlX=S(12),pnlY=CH-S(110),pnlW=S(180),pnlH=S(95);
  C.fillStyle='rgba(10,14,26,0.92)';C.beginPath();C.roundRect(pnlX,pnlY,pnlW,pnlH,S(4));C.fill();
  C.strokeStyle='rgba(255,255,255,0.08)';C.lineWidth=1;C.beginPath();C.roundRect(pnlX,pnlY,pnlW,pnlH,S(4));C.stroke();
  C.font='bold '+S(6.5)+'px "JetBrains Mono"';C.fillStyle='rgba(255,255,255,0.5)';C.textAlign='left';
  C.fillText('RUNWAY SAFETY SYSTEM',pnlX+S(8),pnlY+S(14));
  // RWY 4L
  const r1c=rwy1State==='CLEAR'?'#10B981':rwy1State==='APPROACH_90'?'#F59E0B':'#EF4444';
  C.fillStyle=r1c;C.beginPath();C.arc(pnlX+S(14),pnlY+S(28),S(3),0,Math.PI*2);C.fill();
  C.font=S(6)+'px "JetBrains Mono"';C.fillStyle='rgba(255,255,255,0.6)';
  C.fillText('RWY 13L  '+(rwy1State==='CLEAR'?'CLEAR':'APPROACH — '+fmt(rwy1ETA)),pnlX+S(22),pnlY+S(30));
  // RWY 4R
  const r2c=rwy2State==='CLEAR'?'#10B981':rwy2State==='APPROACH_90'?'#F59E0B':'#EF4444';
  C.fillStyle=r2c;C.beginPath();C.arc(pnlX+S(14),pnlY+S(44),S(3),0,Math.PI*2);C.fill();
  C.fillStyle='rgba(255,255,255,0.6)';
  C.fillText('RWY 13R  '+(rwy2State==='CLEAR'?'CLEAR':'APPROACH — '+fmt(rwy2ETA)),pnlX+S(22),pnlY+S(46));
  // Incursion prevention
  const ipColor=rwy1State!=='CLEAR'||emActive?'#EF4444':'#10B981';
  C.fillStyle=ipColor;C.beginPath();C.arc(pnlX+S(14),pnlY+S(62),S(3),0,Math.PI*2);C.fill();
  C.font='bold '+S(5.5)+'px "JetBrains Mono"';C.fillStyle=ipColor;
  const ipFlash=rwy1State!=='CLEAR'?(Math.sin(simT*4)>0?'\u26D4 ':'\u26D4 '):'\u26D4 ';
  C.fillText(ipFlash+'INCURSION PREVENTION  '+(rwy1State!=='CLEAR'?'ACTIVE':'STANDBY'),pnlX+S(22),pnlY+S(64));
  // Transponder status line
  if(transponderLost){
    C.fillStyle='#EF4444';C.font='bold '+S(5)+'px "JetBrains Mono"';
    const blink=Math.sin(simT*8)>0;
    if(blink)C.fillText('\u26A0 XPDR LOSS: '+transponderLost+' — '+Math.round(transponderLostTimer)+'s',pnlX+S(8),pnlY+S(80));
  }

  // Emergency vignette
  if(emActive){const a=0.06+Math.sin(simT*4)*0.025;const gr=C.createRadialGradient(CW/2,CH/2,CW*0.2,CW/2,CH/2,CW*0.7);gr.addColorStop(0,'rgba(239,68,68,0)');gr.addColorStop(1,'rgba(239,68,68,'+a+')');C.fillStyle=gr;C.fillRect(0,0,CW,CH)}

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════
// SIMULATION TICK
// ═══════════════════════════════════════════════════
function simTick(){
  const dt=TICK/1000;simT+=dt;dispCD-=dt;
  Object.values(vehs).forEach(v=>tickV(v,dt));
  Object.values(gateS).forEach(gs=>tickGate(gs,dt));
  tickInbound();
  tickRunwaySafety(dt);
  if(!emActive&&simT>=nextEm)triggerEm();
  if(emActive){emTimer+=dt;if(emTimer>=EM_DUR)resolveEm()}
}
function uiTick(){updKPI();renderFleet();renderInbound();if(selId)updCard()}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init(){
  FLEET.forEach((id,i)=>{vehs[id]=mkVeh(id,i)});
  Object.keys(GATES).forEach(id=>{gateS[id]=mkGate(id)});

  // Pre-populate 6 gates across both piers
  // A1: mid-service
  const g1=gateS['A1'];
  g1.state='AT_GATE';g1.ac={flight:'AA 102',airline:'AA',color:'#CC0000'};
  g1.acPos=[...GATES.A1.pos];g1.turnStart=simT-40;g1.needed=[];g1.assigned=['FUEL-01','BAG-01'];
  const f1=vehs['FUEL-01'];if(f1){f1.state='SERVICING';f1.gate='A1';f1.task='Fuel · AA 102';f1.svcT=50;f1.pos=[GATES.A1.pos[0]+15,GATES.A1.pos[1]]}
  const b1=vehs['BAG-01'];if(b1){b1.state='SERVICING';b1.gate='A1';b1.task='Baggage · AA 102';b1.svcT=70;b1.pos=[GATES.A1.pos[0]-12,GATES.A1.pos[1]+5]}

  // A3: at gate, just arrived — needs full service
  const g3=gateS['A3'];
  g3.state='AT_GATE';g3.ac={flight:'DL 318',airline:'DL',color:'#003366'};
  g3.acPos=[...GATES.A3.pos];g3.turnStart=simT;g3.needed=['GPU','FUEL','BAG','CAT'];g3.assigned=[];

  // B1: mid-service (east pier)
  const gb1=gateS['B1'];
  gb1.state='AT_GATE';gb1.ac={flight:'WN 742',airline:'WN',color:'#FF6600'};
  gb1.acPos=[...GATES.B1.pos];gb1.turnStart=simT-80;gb1.needed=[];gb1.assigned=['BAG-03','GPU-02'];
  const b3=vehs['BAG-03'];if(b3){b3.state='SERVICING';b3.gate='B1';b3.task='Baggage · WN 742';b3.svcT=60;b3.pos=[GATES.B1.pos[0]+12,GATES.B1.pos[1]]}
  const gp2=vehs['GPU-02'];if(gp2){gp2.state='SERVICING';gp2.gate='B1';gp2.task='GPU · WN 742';gp2.svcT=40;gp2.pos=[GATES.B1.pos[0]-10,GATES.B1.pos[1]+4]}

  // B3: at gate, nearly done
  const gb3=gateS['B3'];
  gb3.state='AT_GATE';gb3.ac={flight:'B6 219',airline:'B6',color:'#00B2A9'};
  gb3.acPos=[...GATES.B3.pos];gb3.turnStart=simT-120;gb3.needed=[];gb3.assigned=['CAT-02'];
  const ct2=vehs['CAT-02'];if(ct2){ct2.state='SERVICING';ct2.gate='B3';ct2.task='Catering · B6 219';ct2.svcT=75;ct2.pos=[GATES.B3.pos[0]+10,GATES.B3.pos[1]-5]}

  // B5: at gate, just docked
  const gb5=gateS['B5'];
  gb5.state='AT_GATE';gb5.ac={flight:'UA 447',airline:'UA',color:'#003087'};
  gb5.acPos=[...GATES.B5.pos];gb5.turnStart=simT;gb5.needed=['GPU','FUEL','BAG','CAT'];gb5.assigned=[];

  // A2: arriving now
  spawnArr('A2');

  // B2, B4: next arrivals soon
  gateS['B2'].nextArr=simT+20;
  gateS['B4'].nextArr=simT+40;

  // Seed turnaround avg with realistic historical data
  turnTimes.push(245,280,260,290,255);

  [{txt:'System online — JFK Terminal 4 · 8 gates',type:'c',tag:'ONLINE',time:'14:30:00'},
   {txt:'AA 102 at Gate A1 — servicing',type:'a',tag:'At Gate',time:'14:30:02'},
   {txt:'WN 742 at Gate B1 — mid-turn',type:'a',tag:'At Gate',time:'14:29:40'},
   {txt:'B6 219 at Gate B3 — nearly done',type:'c',tag:'At Gate',time:'14:29:15'},
   {txt:'UA 447 at Gate B5 — just docked',type:'a',tag:'At Gate',time:'14:31:00'},
  ].reverse().forEach(e=>dispLog.push(e));
  renderLog();

  setInterval(simTick,TICK);
  setInterval(uiTick,500);
  setInterval(()=>{runDispatch();dispCD=DISP_INT},DISP_INT*1000);
  setTimeout(runDispatch,2000);
  requestAnimationFrame(render);
}
init();
</script>
