  <circle cx="30" cy="605" r="5" fill="rgba(0,255,65,0.9)"/>
  <text x="44" y="610" font-family="'Courier New',monospace" font-size="12" font-weight="bold" letter-spacing="2" fill="rgba(0,255,65,0.8)">GROUNDCONTROL AI</text>

